<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no,initial-scalable=1.0,maximum-scalable=1.0, minimum-scalable=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>TICKETS-FET</title>
    <meta name="description" content="Sistema de tickets para inventario">
    <meta name="keywords" content="Sistema, tickets, inventario">
    <meta name="author" content="Mariajose Ramirez G">
    <link rel="stylesheet" href="css/default.css" type="text/css">
    <link rel="shorcut icon" href="img/icon.png">
</head>

<body>

<!-- LOGO -->
<img src="img/logo.png" alt="Logo" class="logo-login">

<main>

<div class="card">

<form id="loginForm" class="form-login">

<h2>INICIO SESIÓN</h2>
<p>Ingresa tus credenciales para acceder</p>

<input id="correo" class="input-login" type="email" placeholder="Correo electrónico" required>
<input id="password" class="input-login" type="password" placeholder="Contraseña" required>

<div class="remember">
<input type="checkbox">
<label>Mantener la sesión iniciada</label>
</div>

<button type="submit" class="btn-enviar">INICIA SESIÓN</button>

<div class="extra-links">
<p>¿Olvidaste tu contraseña? <a href="Recuperar.html">Recuperar</a></p>
<p>¿No tienes cuenta? <a href="Registrar.html">Regístrate</a></p>
</div>

</form>
</div>

</main>

<footer>
<small>Mariajose © 2026</small>
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let correo = document.getElementById("correo").value.trim();
    let pass = document.getElementById("password").value.trim();

    // ADMIN
    if(correo === "admin@admin.com" && pass === "12345678"){

        localStorage.setItem("login", "true");

        localStorage.setItem("usuario", JSON.stringify({
            nombre: "Admin Sport",
            rol: "admin",
            correo: correo
        }));

        window.location.href = "dashboard.html";
    }

    // USER
    else if(correo === "user@sporthub.com" && pass === "12345678"){

        localStorage.setItem("login", "true");

        localStorage.setItem("usuario", JSON.stringify({
            nombre: "User Sport",
            rol: "user",
            correo: correo
        }));

        window.location.href = "userinicio.html";
    }

    else{
        alert("Correo o contraseña incorrectos");
    }
});
</script>

</body>
</html>
