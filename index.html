<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICKETS-FET</title>
    <meta name="description" content="Sistema de tickets para inventario">
    <meta name="keywords" content="Sistema, tickets, inventario">
    <meta name="author" content="Mariajose Ramirez G">
    <link rel="stylesheet" href="css/default.css">
    <link rel="stylesheet" href="css/mediaquerys.css">
    <link rel="shortcut icon" href="img/icon.png">

    <script src="https://kit.fontawesome.com/9d1a86738f.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- LOGO -->
    <img src="img/logo.png" alt="Logo" class="logo-login">

    <main>
    <!-- TARJETA DE INICIO DE SESIÓN -->
        <div class="card">
    <!-- FORMULARIO DE INICIO DE SESIÓN -->
        <form action="#" method="POST" class="form-login" id="loginForm">

            <h2>INICIO SESIÓN</h2>
            <p>Ingresa tus credenciales para acceder</p>
    <!-- SOLO EMAIL Y CONTRASEÑA -->
            <div class="form-login">
                <input 
        id="email" 
        class="input-login"
        type="email" 
        name="email" 
        placeholder="Correo electrónico" 
        maxlength="50" 
        minlength="5" 
        title="Introduce tu correo electrónico" 
        required>
        <input 
        id="password" 
        class="input-login"
        type="password" 
        name="password"
        placeholder="Contraseña" 
        maxlength="25" 
        minlength="8" 
        title="Introduce tu contraseña" 
        pattern=".{8,25}" 
        required>


    <div class="remember">
        <input type="checkbox">
        <label>Mantener la sesión iniciada</label>
    </div>

<a href="dashboard.html">
        <button type="submit" class="btn-enviar">INICIA SESIÓN</button>
</a>


    <div class="extra-links">
        <p>¿Olvidaste tu contraseña? <a href="Recuperar.html">Recuperar</a></p>
        <p>¿No tienes cuenta? <a href="Registrar.html">Regístrate</a></p>
    </div>

</div>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <small>Mariajose &copy; 2026</small>
    </footer>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const adminEmail = "admin@admin.com";
    const adminPassword = "12345678";

    if(email === adminEmail && password === adminPassword){

        localStorage.setItem("login", "true");
        window.location.href = "dashboard.html";
    }else{

        alert("Correo o contraseña incorrectos");
    }
});
</script>
</body>
</html>
